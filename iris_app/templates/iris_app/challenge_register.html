{% extends 'iris_app/base.html' %}
{% load static %}

{% block content %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap');

    :root {
        --impact-red: #5F0229;
        --vibrant-red: #E31837;
        --bg-cream: #F6F2EA;
        --text-dark: #29251D;
        --label-grey: rgba(77, 77, 79, 0.8);
    }

    .reg-page-wrapper {
        min-height: 100vh;
        background: #F0F0F0;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px 20px;
        font-family: 'Poppins', sans-serif;
    }

    .reg-main-card {
        width: 100%;
        max-width: 510px;
        background-color: var(--bg-cream);
        /* Precise background pattern matching the design */
        background-image: linear-gradient(rgba(246, 242, 234, 0.85), rgba(246, 242, 234, 0.85)),
        url('{% static "iris_app/images/hex_pattern_bg.png" %}');
        background-size: cover;
        background-position: center;
        border-radius: 4px;
        box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.3);
        position: relative;
        overflow: hidden;
        border: 8px solid var(--impact-red);
        display: flex;
        flex-direction: column;
    }

    .reg-card-inner {
        padding: 40px 40px 32px 40px;
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 34px;
    }

    .reg-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .reg-header h1 {
        color: var(--impact-red);
        font-size: 24px;
        font-family: 'Poppins', sans-serif;
        font-weight: 500;
        margin: 0;
    }

    .btn-close-modal {
        background: none;
        border: none;
        color: #333;
        font-size: 28px;
        cursor: pointer;
        padding: 0;
        line-height: 1;
        transition: transform 0.2s;
    }

    .btn-close-modal:hover {
        transform: scale(1.1);
    }

    /* Refined Toggle Switch */
    .toggle-nav {
        background: #E5DFD3;
        padding: 4px;
        border-radius: 10px;
        display: inline-flex;
        width: 380px;
        /* Slightly wider as per image */
        gap: 4px;
        margin-bottom: 10px;
    }

    .toggle-tab {
        flex: 1;
        text-align: center;
        padding: 12px 0;
        font-size: 15px;
        font-weight: 500;
        color: #4A453D;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        border-radius: 8px;
    }

    .toggle-tab.active {
        background: #FFFFFF;
        color: #000000;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.08);
    }

    .toggle-tab i {
        font-size: 14px;
    }

    .toggle-tab.disabled {
        opacity: 0.5;
        cursor: not-allowed;
        pointer-events: none;
        background: #f0f0f0;
        color: #999;
    }

    /* Input rows with underlined labels */
    .reg-form-body {
        display: flex;
        flex-direction: column;
        gap: 24px;
    }

    .form-row {
        display: flex;
        flex-direction: column;
        border-bottom: 1.5px solid rgba(0, 0, 0, 0.2);
        padding: 0 0 4px 0;
        position: relative;
    }

    .form-row label {
        font-size: 16px;
        font-weight: 500;
        color: #000;
        margin-bottom: 8px;
    }

    .form-row input {
        background: transparent;
        border: none;
        outline: none;
        font-size: 16px;
        font-family: 'Poppins', sans-serif;
        font-weight: 400;
        color: #333;
        width: 100%;
        padding: 4px 0;
    }

    .form-row.has-select::after {
        content: '\2304';
        /* Downward arrowhead */
        position: absolute;
        right: 0;
        bottom: 8px;
        font-size: 20px;
        color: #333;
        font-weight: bold;
    }

    /* Register Button - Match image shape and color */
    .btn-submit-main {
        background: var(--vibrant-red);
        color: white;
        border: none;
        padding: 14px 40px;
        font-family: 'Poppins', sans-serif;
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
        width: auto;
        min-width: 280px;
        /* Matching the relative width in image */
        align-self: flex-start;
        border-radius: 2px;
        box-shadow: 0 4px 10px rgba(227, 24, 55, 0.2);
        transition: all 0.2s;
    }

    .btn-submit-main:hover {
        background: #CC1632;
        box-shadow: 0 6px 15px rgba(227, 24, 55, 0.3);
    }

    .btn-cancel-link {
        color: var(--impact-red);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
    }

    /* Team Section - Floating or Side by Side?
       In the provided image, it looks like a single column view.
       I will make it a scrollable area if Team is selected.
    */
    #team-details-area {
        margin-top: 20px;
        display: none;
        border-top: 1px solid rgba(0, 0, 0, 0.1);
        padding-top: 20px;
    }
</style>

<div class="reg-page-wrapper">
    <main class="reg-main-card">
        <div class="reg-card-inner">
            <header class="reg-header">
                <h1>Register Now</h1>
                <button type="button" class="btn-close-modal" onclick="window.history.back()">×</button>
            </header>

            <div class="toggle-nav">
                <div class="toggle-tab {% if participation_type == 'team' %}disabled{% elif participation_type != 'team' %}active{% endif %}"
                    id="tab-ind" onclick="setRegMode('individual')">
                    <i class="fas fa-user"></i> individual
                </div>

                <div class="toggle-tab {% if participation_type == 'individual' %}disabled{% elif participation_type == 'team' %}active{% endif %}"
                    id="tab-team" onclick="setRegMode('Team')">
                    <i class="fas fa-users"></i> Team
                </div>
            </div>

            <form id="regForm" method="POST" action="{% url 'submit_registration' challenge.challenge_id %}">
                {% csrf_token %}
                <input type="hidden" name="participation_mode" id="participation_mode"
                    value="{% if participation_type == 'team' %}Team{% else %}individual{% endif %}">

                <div class="reg-form-body">
                    <div class="form-row has-select">
                        <label>Challenge</label>
                        <input type="text" value="{{ challenge.title }}" disabled>
                    </div>

                    <div class="form-row">
                        <label>Full Name</label>
                        <input type="text" value="{{ user.full_name }}" disabled>
                    </div>

                    <div class="form-row">
                        <label>Employee ID</label>
                        <input type="text" value="{{ user.employee_id }}" disabled>
                    </div>

                    <div class="form-row">
                        <label>Email ID (Official)</label>
                        <input type="text" value="{{ user.email }}" disabled>
                    </div>

                    <!-- Team Fields (Hidden by default) -->
                    <div id="team-details-area">
                        <div class="form-row">
                            <label>Team Name</label>
                            <input type="text" name="team_name" placeholder="Enter Team Name">
                        </div>
                        <div
                            style="margin-top: 15px; display: flex; justify-content: space-between; align-items: center;">
                            <span style="font-size: 12px; font-weight: 600;">Team Members (1)</span>
                            <button type="button"
                                style="background: var(--impact-red); color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer;"
                                onclick="addMember()">+ Add</button>
                        </div>
                        <div id="members-list" style="margin-top: 10px; max-height: 200px; overflow-y: auto;">
                            <!-- Dynamic members -->
                        </div>
                    </div>
                </div>

                <div class="reg-footer">
                    <div style="height: 34px;"></div> <!-- Spacing as per image -->
                    <button type="submit" class="btn-submit-main">Register Now</button>
                    <a href="{% url 'challenge_list' %}" class="btn-cancel-link">Cancel</a>
                </div>
            </form>
        </div>
    </main>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const pType = "{{ participation_type }}";
        if (pType === 'team') {
            setRegMode('Team');
        } else {
            setRegMode('individual');
        }
    });

    function setRegMode(mode) {
        document.getElementById('participation_mode').value = mode;
        const indTab = document.getElementById('tab-ind');
        const teamTab = document.getElementById('tab-team');
        const teamArea = document.getElementById('team-details-area');

        if (mode === 'individual') {
            if (indTab) indTab.classList.add('active');
            if (teamTab) teamTab.classList.remove('active');
            teamArea.style.display = 'none';
        } else {
            if (indTab) indTab.classList.remove('active');
            if (teamTab) teamTab.classList.add('active');
            teamArea.style.display = 'block';
        }
    }

    let members = [];
    const MAX_TEAM = parseInt("{{ max_team_size }}") || 5;

    function addMember() {
        if (members.length + 1 >= MAX_TEAM) {
            alert("Max team size reached");
            return;
        }
        const email = prompt("Enter member email:");
        if (email) {
            members.push(email);
            renderMembers();
        }
    }

    function renderMembers() {
        const list = document.getElementById('members-list');
        list.innerHTML = members.map((m, i) => `
            <div style="background: #FFF; padding: 8px; border-bottom: 1px solid #EEE; display: flex; justify-content: space-between; align-items: center; font-size: 12px;">
                <span>${m}</span>
                <span style="color: red; cursor: pointer;" onclick="removeMember(${i})">×</span>
            </div>
        `).join('');
    }

    function removeMember(i) {
        members.splice(i, 1);
        renderMembers();
    }

    document.getElementById('regForm').onsubmit = function (e) {
        e.preventDefault();
        const formData = new FormData(this);
        // Add dynamic members to formData
        members.forEach(email => formData.append('team_member_emails[]', email));

        fetch(this.action, {
            method: 'POST',
            body: formData,
            headers: { 'X-CSRFToken': '{{ csrf_token }}' }
        })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'success') {
                    alert('Success!');
                    window.location.href = data.redirect_url;
                } else {
                    alert('Error: ' + data.message);
                }
            });
    };
</script>
{% endblock %}
