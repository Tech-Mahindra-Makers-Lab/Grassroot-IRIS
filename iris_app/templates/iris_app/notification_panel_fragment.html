{% load static %}
<div id="notifBackdrop" class="notif-backdrop" onclick="closeNotifPanel()"></div>
<div id="notifDrawer" class="notif-drawer-wrapper">
    <div class="notif-panel-content">
        <header class="notif-panel-header">
            <div class="notif-title-wrapper">
                <h3>All Notifications</h3>
                <span class="notif-count-badge" id="panelNotifCount">0</span>
            </div>
            <div class="header-actions">
                <button type="button" class="btn-mark-all" onclick="markAllAsReadPanel()">Mark all as read</button>
                <button type="button" class="btn-close-notif" onclick="closeNotifPanel()">×</button>
            </div>
        </header>

        <div class="notif-panel-list" id="panelNotifList">
            <!-- Content loaded via AJAX -->
            <div class="panel-loading">
                <div class="panel-spinner"></div>
                <span>Loading notifications...</span>
            </div>
        </div>

        <div class="notif-panel-footer">
            <a href="{% url 'notification_list' %}" class="btn-view-all">View All Notifications</a>
        </div>
    </div>
</div>

<style>
    .notif-drawer-wrapper {
        position: fixed;
        top: 0;
        right: -420px;
        width: 420px;
        height: 100vh;
        background: white;
        box-shadow: -4px 0 24px rgba(0, 0, 0, 0.15);
        z-index: 2000;
        transition: right 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        display: flex;
        flex-direction: column;
    }

    .notif-drawer-wrapper.open {
        right: 0;
    }

    .notif-backdrop {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.3);
        backdrop-filter: blur(2px);
        z-index: 1999;
        display: none;
    }

    .notif-panel-content {
        display: flex;
        flex-direction: column;
        height: 100%;
    }

    .notif-panel-header {
        padding: 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #E1E4EA;
    }

    .notif-title-wrapper {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .notif-panel-header h3 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
        color: #101828;
    }

    .notif-count-badge {
        background: #E31837;
        color: white;
        font-size: 11px;
        font-weight: 600;
        padding: 2px 8px;
        border-radius: 10px;
    }

    .header-actions {
        display: flex;
        align-items: center;
        gap: 16px;
    }

    .btn-mark-all {
        background: none;
        border: none;
        color: #4A453D;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        padding: 0;
    }

    .btn-mark-all:hover {
        color: #E31837;
        text-decoration: underline;
    }

    .btn-close-notif {
        background: none;
        border: none;
        font-size: 28px;
        color: #4D4D4F;
        cursor: pointer;
        line-height: 1;
    }

    .notif-panel-list {
        flex: 1;
        overflow-y: auto;
        padding: 0;
    }

    .notif-panel-footer {
        padding: 16px 24px;
        border-top: 1px solid #E1E4EA;
        text-align: center;
        background: #F9FAFB;
    }

    .btn-view-all {
        color: #E31837;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
    }

    .panel-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 200px;
        color: #667085;
        gap: 12px;
    }

    .panel-spinner {
        width: 30px;
        height: 30px;
        border: 3px solid #F2F4F7;
        border-top: 3px solid #E31837;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    /* Styles for items inside panel */
    .p-notif-item {
        display: flex;
        padding: 16px 24px;
        border-bottom: 1px solid #F2F4F7;
        gap: 16px;
        text-decoration: none;
        transition: background 0.2s;
    }

    .p-notif-item:hover {
        background: #F9FAFB;
    }

    .p-notif-item.unread {
        background: rgba(227, 24, 55, 0.03);
    }

    .p-notif-accent {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-top: 6px;
        flex-shrink: 0;
    }

    .p-accent-success { background: #0AD35A; }
    .p-accent-danger { background: #E31837; }
    .p-accent-warning { background: #F97B2C; }
    .p-accent-info { background: #0A0838; }

    .p-notif-body {
        flex: 1;
    }

    .p-notif-msg {
        color: #101828;
        font-size: 14px;
        font-weight: 500;
        line-height: 1.4;
        margin-bottom: 4px;
    }

    .p-notif-time {
        color: #667085;
        font-size: 12px;
    }
</style>

<script>
    function openNotifPanel() {
        document.getElementById('notifDrawer').classList.add('open');
        document.getElementById('notifBackdrop').style.display = 'block';
        document.body.style.overflow = 'hidden';
        loadPanelNotifications();
    }

    function closeNotifPanel() {
        document.getElementById('notifDrawer').classList.remove('open');
        document.getElementById('notifBackdrop').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function loadPanelNotifications() {
        const listContainer = document.getElementById('panelNotifList');
        fetch('/notifications/?fragment=true', {
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
        .then(response => response.text())
        .then(html => {
            listContainer.innerHTML = html;
            // Update count
            const unreadCount = listContainer.querySelectorAll('.unread').length;
            document.getElementById('panelNotifCount').textContent = unreadCount;

            // Add click listeners to links
            listContainer.querySelectorAll('.notif-action-link').forEach(link => {
                link.addEventListener('click', function(e) {
                    const parentItem = this.closest('.p-notif-item');
                    if (parentItem && parentItem.classList.contains('unread')) {
                        const notifId = parentItem.id.replace('p-notif-', '');
                        fetch(`/notifications/mark-read/${notifId}/`)
                        .then(res => res.json())
                        .then(data => {
                            if (data.status === 'success') {
                                parentItem.classList.remove('unread');
                                updatePanelBadgeCount();
                            }
                        });
                    }
                });
            });
        })
        .catch(err => {
            listContainer.innerHTML = '<div class="panel-loading" style="color:red;">Error loading notifications</div>';
        });
    }

    function updatePanelBadgeCount() {
        const listContainer = document.getElementById('panelNotifList');
        const unreadCount = listContainer.querySelectorAll('.unread').length;
        document.getElementById('panelNotifCount').textContent = unreadCount;
        
        // Also update the sidebar badge if it exists
        const sidebarBadge = document.querySelector('.sidebar-badge');
        if (unreadCount === 0) {
            if (sidebarBadge) sidebarBadge.remove();
        } else {
            if (sidebarBadge) {
                sidebarBadge.textContent = unreadCount;
            }
        }
    }

    function markAllAsReadPanel() {
        fetch('{% url "mark_all_notifications_as_read" %}')
        .then(response => response.json())
        .then(data => {
            if (data.status === 'success') {
                document.querySelectorAll('.p-notif-item').forEach(item => {
                    item.classList.remove('unread');
                });
                document.getElementById('panelNotifCount').textContent = '0';
                // Update sidebar badge if it exists
                const sidebarBadge = document.querySelector('.sidebar-badge');
                if (sidebarBadge) sidebarBadge.remove();
            }
        });
    }
</script>
